name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /wuxia/
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev --production=false

      - name: Run tests
        run: |
          node --version
          pwd
          ls -la node_modules | head -50
          ls -la node_modules/vitest || true
          test -f ./node_modules/vitest/vitest.mjs
          node ./node_modules/vitest/vitest.mjs run --no-file-parallelism 2>&1 | tee vitest.log
          test ${PIPESTATUS[0]} -eq 0 || (cat vitest.log && exit 1)

      - name: Build site
        run: node ./node_modules/typescript/bin/tsc --noEmit && node ./node_modules/vite/bin/vite.js build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-log
          path: vitest.log
          if-no-files-found: ignore

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
